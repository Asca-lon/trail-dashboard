# trail-dashboard — 팀 누구나 clone 후 한 방에 실행.
#
# ── 기본 (DB 없이, mock 모드) ─────────────────────────────────
#   docker compose up
#   → http://localhost:8000  (API + 화면 한 포트)
#   A의 DB가 아직 없어도 C의 화면이 mock 값으로 그대로 돈다.
#
# ── DB까지 (A의 집계가 준비된 뒤) ─────────────────────────────
#   USE_MOCK=0 docker compose --profile db up
#   → postgres 컨테이너가 뜨고, api 가 USE_MOCK=0 으로 그 DB를 읽는다.
#   db/init_schema.sql 이 최초 1회 자동 실행되어 빈 스키마가 만들어진다.
#   (집계 데이터 적재는 A의 collector/processor 몫 — 이 compose 범위 밖)
#
# 운영 상주가 아니라 "어디서든 clone → 실행"이 목적. 완성 후 서버에서 내려도
# 팀원은 이 파일 하나로 동일 환경을 재현한다.

services:
  api:
    build: .
    image: trail-dashboard-api
    ports:
      - "8000:8000"
    # .env 전체를 컨테이너로 전달한다. 수집기(rail/weather collector)가 컨테이너 안에서
    # 돌 때 PUBLIC_DATA_API_KEY · KMA_API_KEY 가 필요하기 때문.
    # (.dockerignore 가 .env 를 이미지에서 빼므로, 런타임에 이렇게 주입해야 한다.)
    #
    # required: false — .env 는 gitignore 라 fresh clone 에는 없다.
    # 없어도 그냥 뜨게 한다(→ USE_MOCK 기본 1, mock 모드). 백필하려면 .env 를 만든다.
    # ⚠️ 아래 environment: 가 env_file 보다 우선한다 → DATABASE_URL 은 host=db 로 덮어써진다.
    env_file:
      - path: .env
        required: false
    environment:
      # 기본은 mock. .env 의 USE_MOCK=0 을 읽어 DB 모드로 뜬다.
      USE_MOCK: "${USE_MOCK:-1}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      # ⚠️ 컨테이너 '안'에서는 DB host 가 반드시 서비스명 'db' 여야 한다.
      #    .env 의 DATABASE_URL 은 host=localhost (호스트에서 실행할 때용)이라
      #    그 값을 그대로 쓰면 컨테이너가 자기 자신을 DB로 찾아 실패한다.
      #    그래서 여기서 host=db 로 '고정'해 env_file 값을 덮어쓴다.
      DATABASE_URL: "postgresql://trail:${POSTGRES_PASSWORD:-trail}@db:5432/trail"
    restart: unless-stopped
    # db 프로파일로 함께 뜰 때만 DB를 기다린다. mock 단독 실행엔 영향 없음.
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    # 순수 PostgreSQL 스키마(IF NOT EXISTS, timescale 확장 없음)라 표준 이미지로 충분.
    # A가 Timescale 하이퍼테이블을 도입하면 image 를 timescale/timescaledb 로 바꾼다.
    image: postgres:16-alpine
    profiles: ["db"]           # 기본 up 에는 안 뜬다. --profile db 일 때만.
    environment:
      POSTGRES_DB: trail
      POSTGRES_USER: trail
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-trail}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 최초 기동 시 1회 실행: 빈 스키마 생성. 데이터는 A가 별도로 적재.
      - ./db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed_stations.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trail -d trail"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
