<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./frontend/dashboard.html">
  <link rel="canonical" href="./frontend/dashboard.html">
  <title>대시보드로 이동 중</title>
  <script>
    const dashboardUrl = new URL("./frontend/dashboard.html", window.location.href);
    dashboardUrl.search = window.location.search;
    dashboardUrl.hash = window.location.hash;
    window.location.replace(dashboardUrl);
  </script>
</head>
<body>
  <p>
    대시보드로 이동 중입니다.
    자동으로 이동하지 않으면 <a href="./frontend/dashboard.html">대시보드 열기</a>를 선택하세요.
  </p>
</body>
</html>
